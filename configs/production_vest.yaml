# Финальный production-конфиг детекции событий no_vest.
#
# Используется YOLO-детектор с прямым классом NO-Safety Vest.
# Веса не входят в репозиторий: см. models/README.md.
#
# Логика:
#   1. Каждые N кадров запускается inference.
#   2. Person tracker присваивает track_id людям.
#   3. Жилет связывается с областью торса человека (torso_y1_ratio …
#      torso_y2_ratio).
#   4. Если у трека > consecutive_frames кадров подряд нет жилета и
#      длительность превышает seconds_threshold, фиксируется
#      no_vest-нарушение.
#   5. main.py применяет EventConsolidatorV3 для объединения
#      повторных срабатываний одного эпизода.

pipeline:
  source: "input/demo.mp4"
  resize_to: [640, 640]
  display_preview: false
  sampling_fps: 12.0
  mode: "motion_gated"
  force_infer_every_n_frames: 30
  reuse_tracks_max_gap_frames: 45
  max_track_stale_frames: 45
  max_frames: 0
  debug_visualization: false
  debug_person_filter_stats: false

motion:
  enabled: true
  min_ratio: 0.0015
  min_ratio_off: 0.0008
  hold_frames_after_motion: 10

model:
  detector_backend: "triple_class"
  weights_path: "models/helmet_vest_repo_best.pt"
  conf_threshold: 0.10
  person_min_conf: 0.30
  imgsz: 640
  roi_imgsz: 320
  use_half: false
  device: ""
  enable_person_fallback: false
  # Псевдонимы классов, которые модель отдаёт в исходных метках.
  class_name_aliases:
    "Safety Vest": "vest"
    "NO-Safety Vest": "no_vest"
    "Person": "person"

roi:
  enabled: false
  person_roi_inference_enabled: false
  global_inference_in_roi: true

event_logic:
  # Каска отключена в этой задаче
  hardhat_confirm_frames: 9999
  no_hardhat_consecutive_frames: 9999
  no_hardhat_seconds_threshold: 9999.0
  # Подтверждение нарушения no_vest
  no_vest_consecutive_frames: 5
  no_vest_seconds_threshold: 0.4
  cooldown_frames: 60
  cooldown_seconds: 3.0
  max_no_vest_hold_frames_without_infer: 4

# Параметры привязки жилета к торсу. Считываются proposed-логикой;
# в этой реализации применяются в event_logic.py при наличии bbox жилета.
vest:
  torso_y1_ratio: 0.20
  torso_y2_ratio: 0.85
  iou_threshold: 0.05
  memory_frames: 5
  min_track_age: 5

tracking:
  history_len: 10
  max_area_growth_ratio: 1.9
  max_width_growth_ratio: 1.45
  max_height_growth_ratio: 1.45
  min_iou_if_growth_triggered: 0.12
  blend_alpha: 0.35
  transfer_iou_threshold: 0.35
  max_transfer_gap_frames: 20

output:
  video_path: "output/processed.mp4"
  events_csv: "output/events.csv"
  events_jsonl: "output/events.jsonl"
  metrics_csv: "output/frame_metrics.csv"
  profile_json: "output/runtime_profile.json"
